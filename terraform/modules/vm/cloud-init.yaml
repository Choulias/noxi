#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2
  - curl
  - git

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker azureuser

  - mkdir -p /app/noxi

  - |
    cat > /app/noxi/.env << EOF
    DB_NAME=${db_name}
    DB_USER=${db_user}
    DB_PASSWORD=${db_password}
    DB_ROOT_PASSWORD=${db_root_password}
    JWT_SECRET=${jwt_secret}
    ENVIRONMENT=${environment}
    EOF

  - echo "${acr_password}" | docker login ${acr_login_server} -u ${acr_username} --password-stdin

  - |
    cat > /app/noxi/docker-compose.yml << EOF
    services:
      frontend:
        image: ${acr_login_server}/noxi-frontend:latest
        ports:
          - "80:80"
        depends_on:
          - backend
        restart: unless-stopped

      backend:
        image: ${acr_login_server}/noxi-backend:latest
        ports:
          - "3000:3000"
        env_file: .env
        depends_on:
          db:
            condition: service_healthy
        restart: unless-stopped

      db:
        image: mariadb:10.11
        environment:
          MYSQL_ROOT_PASSWORD: \${db_root_password}
          MYSQL_DATABASE: \${db_name}
          MYSQL_USER: \${db_user}
          MYSQL_PASSWORD: \${db_password}
        volumes:
          - db_data:/var/lib/mysql
        healthcheck:
          test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
          interval: 10s
          timeout: 5s
          retries: 5
        restart: unless-stopped

      node-exporter:
        image: prom/node-exporter:latest
        restart: unless-stopped
        volumes:
          - /proc:/host/proc:ro
          - /sys:/host/sys:ro
          - /:/rootfs:ro
        command:
          - "--path.procfs=/host/proc"
          - "--path.rootfs=/rootfs"
          - "--path.sysfs=/host/sys"

      prometheus:
        image: prom/prometheus:latest
        restart: unless-stopped
        ports:
          - "9090:9090"
        volumes:
          - /app/noxi/prometheus.yml:/etc/prometheus/prometheus.yml
          - /app/noxi/alerts.yml:/etc/prometheus/alerts.yml
          - prometheus_data:/prometheus
        command:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.retention.time=15d"

      loki:
        image: grafana/loki:2.9.0
        restart: unless-stopped
        ports:
          - "3100:3100"
        volumes:
          - loki_data:/loki
        command: -config.file=/etc/loki/local-config.yaml

      grafana:
        image: grafana/grafana:latest
        restart: unless-stopped
        ports:
          - "3001:3000"
        environment:
          GF_SECURITY_ADMIN_PASSWORD: "admin2026!"
        volumes:
          - grafana_data:/var/lib/grafana

      alertmanager:
        image: prom/alertmanager:latest
        restart: unless-stopped
        ports:
          - "9093:9093"
        volumes:
          - /app/noxi/alertmanager.yml:/etc/alertmanager/alertmanager.yml

    volumes:
      db_data:
      prometheus_data:
      grafana_data:
      loki_data:
    EOF

    - |
    cat > /app/noxi/prometheus.yml << EOF
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - "alerts.yml"
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: "node-exporter"
        static_configs:
          - targets: ["node-exporter:9100"]
    EOF

  - |
    cat > /app/noxi/alerts.yml << EOF
    groups:
      - name: noxi-alerts
        rules:
          - alert: HighCPUUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "CPU élevé sur {{ \$labels.instance }}"
              description: "CPU à {{ \$value }}% depuis 2 minutes"
          - alert: LowMemory
            expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Mémoire faible sur {{ \$labels.instance }}"
              description: "Seulement {{ \$value }}% de RAM disponible"
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service down : {{ \$labels.job }}"
              description: "Le service {{ \$labels.job }} ne répond plus"
    EOF

  - |
    cat > /app/noxi/alertmanager.yml << EOF
    global:
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "noxi.alerts@gmail.com"
    route:
      group_by: ["alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "email"
    receivers:
      - name: "email"
        email_configs:
          - to: "TON_EMAIL@gmail.com"
            auth_username: "noxi.alerts@gmail.com"
            auth_password: "TON_APP_PASSWORD"
            send_resolved: true
    EOF

  - cd /app/noxi && docker compose up -d