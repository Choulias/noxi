#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2
  - curl
  - git

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker azureuser

  - mkdir -p /app/noxi

  - |
    cat > /app/noxi/.env << EOF
    DB_NAME=${db_name}
    DB_USER=${db_user}
    DB_PASSWORD=${db_password}
    DB_ROOT_PASSWORD=${db_root_password}
    JWT_SECRET=${jwt_secret}
    ENVIRONMENT=${environment}
    EOF

  - echo "${acr_password}" | docker login ${acr_login_server} -u ${acr_username} --password-stdin

  - |
    cat > /app/noxi/docker-compose.yml << EOF
    services:
      frontend:
        image: ${acr_login_server}/noxi-frontend:latest
        ports:
          - "80:80"
        depends_on:
          - backend
        restart: unless-stopped

      backend:
        image: ${acr_login_server}/noxi-backend:latest
        ports:
          - "3000:3000"
        env_file: .env
        depends_on:
          db:
            condition: service_healthy
        restart: unless-stopped

      db:
        image: mariadb:10.11
        environment:
          MYSQL_ROOT_PASSWORD: \${db_root_password}
          MYSQL_DATABASE: \${db_name}
          MYSQL_USER: \${db_user}
          MYSQL_PASSWORD: \${db_password}
        volumes:
          - db_data:/var/lib/mysql
        healthcheck:
          test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
          interval: 10s
          timeout: 5s
          retries: 5
        restart: unless-stopped

    volumes:
      db_data:
    EOF

  - cd /app/noxi && docker compose up -d