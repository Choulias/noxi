global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "noxi.alerts@gmail.com"

# ─────────────────────────────────────────────────────────
# ROUTING
# Toutes les alertes vont vers le receiver "email"
# ─────────────────────────────────────────────────────────
route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "email"

# ─────────────────────────────────────────────────────────
# RECEIVERS
# Où envoyer les alertes — ici par email
# ─────────────────────────────────────────────────────────
receivers:
  - name: "email"
    email_configs:
      - to: "TON_EMAIL@gmail.com"
        auth_username: "noxi.alerts@gmail.com"
        auth_password: "TON_APP_PASSWORD_GMAIL"
        send_resolved: true