name: CD — Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Build, Push & Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test --if-present

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Login to ACR
        run: az acr login --name noxiacrwnblqe

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/noxi-frontend:latest,${{ secrets.ACR_LOGIN_SERVER }}/noxi-frontend:${{ github.sha }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/noxi-backend:latest,${{ secrets.ACR_LOGIN_SERVER }}/noxi-backend:${{ github.sha }}

      - name: Start staging VM
        run: |
          az vm start \
            --resource-group rg-noxi-staging \
            --name vm-noxi-staging

      - name: Wait for VM to be ready
        run: |
          echo "Waiting for SSH to be available..."
          for i in {1..30}; do
            if nc -z -w5 ${{ secrets.VM_STAGING_IP }} 22 2>/dev/null; then
              echo "VM SSH port is open!"
              sleep 10
              break
            fi
            echo "Attempt $i/30 - waiting 10s..."
            sleep 10
          done

      - name: Deploy to staging VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_STAGING_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /app/noxi

            # Créer le .env
            sudo tee /app/noxi/.env > /dev/null << EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}
            DB_HOST=db
            DB_PORT=3306
            ENVIRONMENT=staging
            EOF

            # Créer le docker-compose.prod.yml
            sudo tee /app/noxi/docker-compose.prod.yml > /dev/null << EOF
            services:
              frontend:
                image: ${{ secrets.ACR_LOGIN_SERVER }}/noxi-frontend:latest
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: unless-stopped

              backend:
                image: ${{ secrets.ACR_LOGIN_SERVER }}/noxi-backend:latest
                ports:
                  - "3000:3000"
                env_file: /app/noxi/.env
                depends_on:
                  db:
                    condition: service_healthy
                restart: unless-stopped

              db:
                image: mariadb:10.11
                environment:
                  MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
                  MYSQL_DATABASE: ${{ secrets.DB_NAME }}
                  MYSQL_USER: ${{ secrets.DB_USER }}
                  MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
                volumes:
                  - db_data:/var/lib/mysql
                healthcheck:
                  test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped

              node-exporter:
                image: prom/node-exporter:latest
                restart: unless-stopped
                volumes:
                  - /proc:/host/proc:ro
                  - /sys:/host/sys:ro
                  - /:/rootfs:ro
                command:
                  - "--path.procfs=/host/proc"
                  - "--path.rootfs=/rootfs"
                  - "--path.sysfs=/host/sys"

              prometheus:
                image: prom/prometheus:latest
                restart: unless-stopped
                ports:
                  - "9090:9090"
                volumes:
                  - prometheus_data:/prometheus
                command:
                  - "--storage.tsdb.retention.time=15d"

              loki:
                image: grafana/loki:2.9.0
                restart: unless-stopped
                ports:
                  - "3100:3100"
                volumes:
                  - loki_data:/loki
                command: -config.file=/etc/loki/local-config.yaml

              grafana:
                image: grafana/grafana:latest
                restart: unless-stopped
                ports:
                  - "3001:3000"
                environment:
                  GF_SECURITY_ADMIN_PASSWORD: "admin2026!"
                volumes:
                  - grafana_data:/var/lib/grafana

              alertmanager:
                image: prom/alertmanager:latest
                restart: unless-stopped
                ports:
                  - "9093:9093"

            volumes:
              db_data:
              prometheus_data:
              grafana_data:
              loki_data:
            EOF

            # Login ACR
            sudo docker login ${{ secrets.ACR_LOGIN_SERVER }} \
              -u ${{ secrets.AZURE_CLIENT_ID }} \
              -p ${{ secrets.AZURE_CLIENT_SECRET }}

            # Pull et démarrer
            cd /app/noxi
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            sudo docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_STAGING_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for app to be ready..."
            for i in $(seq 1 24); do
              if curl -sf http://localhost > /dev/null 2>&1; then
                echo "App is ready!"
                break
              fi
              echo "Attempt $i/24 - waiting 5s..."
              sleep 5
            done
            sudo docker compose -f /app/noxi/docker-compose.prod.yml ps
            curl -f http://localhost || exit 1
