name: CD — Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Build, Push & Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test --if-present

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Login to ACR
        run: |
          az acr login --name noxiacrxeadow

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: noxiacrxeadow.azurecr.io/noxi-frontend:latest,noxiacrxeadow.azurecr.io/noxi-frontend:${{ github.sha }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: noxiacrxeadow.azurecr.io/noxi-backend:latest,noxiacrxeadow.azurecr.io/noxi-backend:${{ github.sha }}

      - name: Start staging VM
        run: |
          az vm start \
            --resource-group rg-noxi-staging \
            --name vm-noxi-staging

      - name: Wait for VM to be ready
        run: |
          echo "Waiting for VM and cloud-init to complete..."
          sleep 120

      - name: Copy files to staging VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_STAGING_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,monitoring/"
          target: "/app/noxi/"

      - name: Deploy to staging VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_STAGING_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cloud-init status --wait || true

            # Créer le .env
            cat > /app/noxi/.env << EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}
            DB_HOST=db
            DB_PORT=3306
            ENVIRONMENT=staging
            EOF

            cd /app/noxi
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            sudo docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_STAGING_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose ps
            curl -f http://localhost || exit 1
