name: CD — Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Build, Push & Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test --if-present

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Login to ACR
        run: |
          az acr login --name noxiacrus92xw

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: noxiacrus92xw.azurecr.io/noxi-frontend:latest,noxiacrus92xw.azurecr.io/noxi-frontend:${{ github.sha }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: noxiacrus92xw.azurecr.io/noxi-backend:latest,noxiacrus92xw.azurecr.io/noxi-backend:${{ github.sha }}

      - name: Start staging VM
        run: |
          az vm start \
            --resource-group rg-noxi-staging \
            --name vm-noxi-staging

      - name: Wait for VM to be ready
        run: |
          echo "Waiting for VM and cloud-init to complete..."
          sleep 120

      - name: Deploy to staging VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_STAGING_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cloud-init status --wait || true
            cd /app/noxi
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_STAGING_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose ps
            curl -f http://localhost || exit 1