name: CD — Deploy Prod

on:
  push:
    branches: [prod]

jobs:
  deploy-prod:
    name: Build, Push & Deploy Prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test --if-present

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Login to ACR
        run: az acr login --name noxiacrypujci

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: noxiacrypujci.azurecr.io/noxi-frontend:latest,noxiacrypujci.azurecr.io/noxi-frontend:${{ github.sha }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: noxiacrypujci.azurecr.io/noxi-backend:latest,noxiacrypujci.azurecr.io/noxi-backend:${{ github.sha }}

      - name: Start prod VM
        run: |
          az vm start \
            --resource-group rg-noxi-prod \
            --name vm-noxi-prod

      - name: Wait for VM to be ready
        run: sleep 60

      - name: Deploy to prod VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_PROD_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /app/noxi

            # Créer le .env
            sudo tee /app/noxi/.env << EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ACR_LOGIN_SERVER=noxiacrypujci.azurecr.io
            DB_HOST=db
            DB_PORT=3306
            ENVIRONMENT=prod
            EOF

            # Créer le docker-compose.prod.yml
            sudo tee /app/noxi/docker-compose.prod.yml << 'EOF'
            services:
              frontend:
                image: noxiacrypujci.azurecr.io/noxi-frontend:latest
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: unless-stopped

              backend:
                image: noxiacrypujci.azurecr.io/noxi-backend:latest
                ports:
                  - "3000:3000"
                env_file: /app/noxi/.env
                depends_on:
                  db:
                    condition: service_healthy
                restart: unless-stopped

              db:
                image: mariadb:10.11
                env_file: /app/noxi/.env
                environment:
                  MYSQL_ROOT_PASSWORD: $DB_ROOT_PASSWORD
                  MYSQL_DATABASE: $DB_NAME
                  MYSQL_USER: $DB_USER
                  MYSQL_PASSWORD: $DB_PASSWORD
                volumes:
                  - db_data:/var/lib/mysql
                healthcheck:
                  test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped

              node-exporter:
                image: prom/node-exporter:latest
                restart: unless-stopped
                volumes:
                  - /proc:/host/proc:ro
                  - /sys:/host/sys:ro
                  - /:/rootfs:ro
                command:
                  - "--path.procfs=/host/proc"
                  - "--path.rootfs=/rootfs"
                  - "--path.sysfs=/host/sys"

              prometheus:
                image: prom/prometheus:latest
                restart: unless-stopped
                ports:
                  - "9090:9090"
                volumes:
                  - prometheus_data:/prometheus
                command:
                  - "--storage.tsdb.retention.time=15d"

              loki:
                image: grafana/loki:2.9.0
                restart: unless-stopped
                ports:
                  - "3100:3100"
                volumes:
                  - loki_data:/loki
                command: -config.file=/etc/loki/local-config.yaml

              grafana:
                image: grafana/grafana:latest
                restart: unless-stopped
                ports:
                  - "3001:3000"
                environment:
                  GF_SECURITY_ADMIN_PASSWORD: "admin2026!"
                volumes:
                  - grafana_data:/var/lib/grafana

              alertmanager:
                image: prom/alertmanager:latest
                restart: unless-stopped
                ports:
                  - "9093:9093"

            volumes:
              db_data:
              prometheus_data:
              grafana_data:
              loki_data:
            EOF

            # Pull et démarrer
            cd /app/noxi
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            sudo docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_PROD_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker compose -f /app/noxi/docker-compose.prod.yml ps
            curl -f http://localhost || exit 1
